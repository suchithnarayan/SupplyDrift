name: secret-scan

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

env:
  GITLEAKS_VERSION: 8.28.0
  GITLEAKS_LINUX_X64_SHA256: a65b5253807a68ac0cafa4414031fd740aeb55f54fb7e55f386acb52e6a840eb

jobs:
  # Blocking gate: scans the checked-out working tree (HEAD). Fast and stays green
  # as long as no secret is present in the current tree.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install gitleaks
        run: |
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_LINUX_X64_SHA256}  /tmp/gitleaks.tar.gz" \
            | sha256sum -c -
          mkdir -p "${RUNNER_TEMP}/gitleaks-bin"
          tar -xzf /tmp/gitleaks.tar.gz -C "${RUNNER_TEMP}/gitleaks-bin" gitleaks
          echo "${RUNNER_TEMP}/gitleaks-bin" >> "${GITHUB_PATH}"
      - name: Verify fixture directories are scanned
        shell: bash
        run: |
          set -euo pipefail

          canary_paths=(
            github-shadow-deps/tests/eval_corpus/.gitleaks-canary
            github-shadow-deps/tests/fixtures/.gitleaks-canary
            image-scanner/tests/fixtures/.gitleaks-canary
            endpoint-dep-inventory/test-manifests/.gitleaks-canary
          )
          cleanup() {
            rm -f "${canary_paths[@]}" /tmp/gitleaks-canary.json
            rmdir github-shadow-deps/tests/eval_corpus 2>/dev/null || true
          }
          trap cleanup EXIT

          for canary_path in "${canary_paths[@]}"; do
            mkdir -p "$(dirname "$canary_path")"
            printf 'SYNTHETIC_TEST_TOKEN=sdp_%s%s\n' \
              'fixture-path-canary-' '0123456789abcdef' > "$canary_path"

            if gitleaks detect --no-git --config .gitleaks.toml --redact \
              --report-format json --report-path /tmp/gitleaks-canary.json; then
              echo "Gitleaks did not detect the fixture canary at $canary_path" >&2
              exit 1
            fi
            jq -e --arg path "$canary_path" \
              'any(.[]; .RuleID == "supplydrift-platform-token" and .File == $path)' \
              /tmp/gitleaks-canary.json >/dev/null

            rm -f "$canary_path" /tmp/gitleaks-canary.json
          done
      - name: Run gitleaks (working tree)
        run: gitleaks detect --no-git --config .gitleaks.toml --redact --verbose

  # Full-history sweep: scans every commit so an add-then-remove secret still
  # surfaces. Informational (non-blocking): history is immutable, so findings
  # here are for maintainer review — the working-tree job above is the gate
  # that keeps the current tree clean.
  gitleaks-history:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_LINUX_X64_SHA256}  /tmp/gitleaks.tar.gz" \
            | sha256sum -c -
          mkdir -p "${RUNNER_TEMP}/gitleaks-bin"
          tar -xzf /tmp/gitleaks.tar.gz -C "${RUNNER_TEMP}/gitleaks-bin" gitleaks
          echo "${RUNNER_TEMP}/gitleaks-bin" >> "${GITHUB_PATH}"
      - name: Run gitleaks (full history)
        run: gitleaks detect --config .gitleaks.toml --redact --verbose
