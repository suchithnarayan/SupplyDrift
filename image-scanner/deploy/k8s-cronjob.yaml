# Scheduled SupplyDrift runners as Kubernetes CronJobs.
#
# Two direct runners on different cadences, each scoped to a named UI source.
# Replace the example --source values and duplicate a CronJob when more source
# names need independent schedules or credentials.
#
# They run on a SEPARATE node pool from the platform (nodeSelector: workload=batch)
# with their own CPU/mem/ephemeral-storage so heavy syft pulls never starve the API/UI.
# NOTE: the `supplydrift-runner-auth` and `dockerhub-creds` Secrets referenced
# below are provisioned OUT OF BAND — never commit credentials to the repo.
# Create them from protected files so values do not appear in process arguments:
#   kubectl -n supplydrift create secret generic supplydrift-runner-auth \
#     --from-file=token=/secure/path/supplydrift-runner.token
#   kubectl -n supplydrift create secret generic dockerhub-creds \
#     --from-file=username=/secure/path/dockerhub.username \
#     --from-file=token=/secure/path/dockerhub.pat
# or manage it via Sealed Secrets / External Secrets Operator / SOPS.
---
# Registry runner — registries only (Docker Hub / GHCR / Harbor / ECR). Hourly.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: supplydrift-registry-scan
  namespace: supplydrift
spec:
  schedule: "0 * * * *"               # top of every hour
  concurrencyPolicy: Forbid           # never overlap runs
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 3000      # kill a stuck run after 50m
      template:
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          nodeSelector: { workload: batch }   # separate from platform nodes
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: runner
              image: your-registry/supplydrift-image-runner:replace-with-digest
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
                readOnlyRootFilesystem: true
              args:
                - "--config-url"
                - "https://supplydrift.example/api/scanner/config"
                - "--source"
                - "prod-registry"      # replace with a registry source name from the UI
                - "--log-format"
                - "json"
              # syft unpacks layers to disk → give it real ephemeral storage + RAM.
              resources:
                requests: { cpu: "500m", memory: "1Gi", ephemeral-storage: "10Gi" }
                limits:   { cpu: "2",    memory: "4Gi", ephemeral-storage: "40Gi" }
              env:
                - { name: HOME, value: /tmp/runner-home }
                - { name: XDG_CACHE_HOME, value: /tmp/runner-cache }
                - { name: SUPPLYDRIFT_TOOL_SANDBOX, value: required }
                - { name: SUPPLYDRIFT_SANDBOX_NETWORK, value: best-effort }
                - { name: SUPPLYDRIFT_RUNNER_TOKEN, valueFrom: { secretKeyRef: { name: supplydrift-runner-auth, key: token } } }
                - { name: DOCKERHUB_USER,  valueFrom: { secretKeyRef: { name: dockerhub-creds, key: username } } }
                - { name: DOCKERHUB_PAT, valueFrom: { secretKeyRef: { name: dockerhub-creds, key: token } } }
              volumeMounts:
                - { name: runner-tmp, mountPath: /tmp }
          volumes:
            - name: runner-tmp
              emptyDir: { sizeLimit: 40Gi }
---
# Cluster runner — scans the running workloads of this cluster. Every 30 min.
# Uses an in-cluster ServiceAccount with read-only RBAC (below).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: supplydrift-cluster-scan
  namespace: supplydrift
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1500
      template:
        spec:
          serviceAccountName: supplydrift-scanner   # read-only, see RBAC below
          restartPolicy: Never
          nodeSelector: { workload: batch }
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: runner
              image: your-registry/supplydrift-image-runner:replace-with-digest # include kubectl
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
                readOnlyRootFilesystem: true
              args:
                - "--config-url"
                - "https://supplydrift.example/api/scanner/config"
                - "--source"
                - "in-cluster"        # the name of your kubernetes source in the UI
                - "--log-format"
                - "json"
              env:
                - { name: HOME, value: /tmp/runner-home }
                - { name: XDG_CACHE_HOME, value: /tmp/runner-cache }
                - { name: SUPPLYDRIFT_TOOL_SANDBOX, value: required }
                - { name: SUPPLYDRIFT_SANDBOX_NETWORK, value: best-effort }
                - { name: SUPPLYDRIFT_RUNNER_TOKEN, valueFrom: { secretKeyRef: { name: supplydrift-runner-auth, key: token } } }
              resources:
                requests: { cpu: "500m", memory: "1Gi", ephemeral-storage: "20Gi" }
                limits:   { cpu: "2",    memory: "6Gi", ephemeral-storage: "60Gi" }
              volumeMounts:
                - { name: runner-tmp, mountPath: /tmp }
          volumes:
            - name: runner-tmp
              emptyDir: { sizeLimit: 60Gi }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: supplydrift-scanner, namespace: supplydrift }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: supplydrift-scanner-readonly }
rules:
  - apiGroups: ["", "apps", "batch"]
    resources: ["pods", "deployments", "statefulsets", "daemonsets", "replicasets", "jobs", "cronjobs"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: supplydrift-scanner-readonly }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: supplydrift-scanner-readonly }
subjects:
  - { kind: ServiceAccount, name: supplydrift-scanner, namespace: supplydrift }
